services:
  # Reverse Proxy
  traefik:
    image: docker.io/library/traefik:v3.1
    container_name: nukelab-traefik
    command:
      - --api.insecure=true
      - --providers.docker=true
      - --providers.docker.exposedbydefault=false
      - --entrypoints.web.address=:80
      - --entrypoints.websecure.address=:443
      - --certificatesresolvers.letsencrypt.acme.tlschallenge=true
      - --certificatesresolvers.letsencrypt.acme.email=${TRAEFIK_ACME_EMAIL:-admin@nukelab.local}
      - --certificatesresolvers.letsencrypt.acme.storage=/letsencrypt/acme.json
      - --log.level=INFO
      - --accesslog=true
    ports:
      - "8080:80"
      - "8443:443"
      - "8090:8080"
    volumes:
      - ${DOCKER_SOCKET:-/var/run/docker.sock}:/var/run/docker.sock:ro
      - ./certs:/certs:ro
      - letsencrypt:/letsencrypt
    networks:
      - nukelab-network
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.traefik.rule=Host(`traefik.localhost`)"
      - "traefik.http.routers.traefik.service=api@internal"
    restart: unless-stopped

  # Database
  postgres:
    image: docker.io/library/postgres:17-alpine
    container_name: nukelab-postgres
    environment:
      POSTGRES_USER: ${DATABASE_USER:-nukelab}
      POSTGRES_PASSWORD: ${DATABASE_PASSWORD:-nukelab123}
      POSTGRES_DB: ${DATABASE_NAME:-nukelab}
    volumes:
      - postgres-data:/var/lib/postgresql/data
      - ./database/init:/docker-entrypoint-initdb.d:Z
    networks:
      - nukelab-network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DATABASE_USER:-nukelab}"]
      interval: 5s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  # Cache & Message Broker
  redis:
    image: docker.io/library/redis:7-alpine
    container_name: nukelab-redis
    networks:
      - nukelab-network
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  # Backend API
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: nukelab-backend
    environment:
      - APP_NAME=${APP_NAME:-NukeLab}
      - APP_ENV=${APP_ENV:-development}
      - APP_DEBUG=${APP_DEBUG:-true}
      - APP_URL=${APP_URL:-http://localhost:8080}
      - PUBLIC_URL=${APP_URL:-http://localhost:8080}
      - APP_TIMEZONE=${APP_TIMEZONE:-UTC}
      - JWT_SECRET=${JWT_SECRET:-dev-jwt-secret-change-in-production-min-32-chars}
      - JWT_ALGORITHM=${JWT_ALGORITHM:-HS256}
      - JWT_EXPIRE_MINUTES=${JWT_EXPIRE_MINUTES:-15}
      - JWT_REFRESH_EXPIRE_DAYS=${JWT_REFRESH_EXPIRE_DAYS:-7}
      - SESSION_SECRET=${SESSION_SECRET:-dev-session-secret-change-in-production}
      - SESSION_MAX_AGE=${SESSION_MAX_AGE:-86400}
      - SESSION_SECURE=${SESSION_SECURE:-false}
      - SESSION_HTTPONLY=${SESSION_HTTPONLY:-true}
      - SESSION_SAMESITE=${SESSION_SAMESITE:-lax}
      - CORS_ORIGINS=${CORS_ORIGINS:-http://localhost:3000,http://localhost:8000}
      - CORS_ALLOW_CREDENTIALS=${CORS_ALLOW_CREDENTIALS:-true}
      - RATE_LIMIT_ENABLED=${RATE_LIMIT_ENABLED:-false}
      - RATE_LIMIT_REQUESTS=${RATE_LIMIT_REQUESTS:-100}
      - RATE_LIMIT_WINDOW=${RATE_LIMIT_WINDOW:-60}
      - AUTH_MODE=${AUTH_MODE:-local}
      - LOCAL_AUTH_ENABLED=${LOCAL_AUTH_ENABLED:-true}
      - LOCAL_AUTH_BCRYPT_ROUNDS=${LOCAL_AUTH_BCRYPT_ROUNDS:-12}
      - DEV_MODE=${DEV_MODE:-true}
      - DEV_ADMIN_USER=${DEV_ADMIN_USER:-admin}
      - DEV_ADMIN_PASSWORD=${DEV_ADMIN_PASSWORD:-admin123}
      - DATABASE_URL=${DATABASE_URL:-postgresql+asyncpg://nukelab:nukelab123@postgres:5432/nukelab}
      - DATABASE_POOL_SIZE=${DATABASE_POOL_SIZE:-10}
      - DATABASE_POOL_MAX_OVERFLOW=${DATABASE_POOL_MAX_OVERFLOW:-10}
      - DATABASE_POOL_TIMEOUT=${DATABASE_POOL_TIMEOUT:-30}
      - DATABASE_ECHO=${DATABASE_ECHO:-false}
      - REDIS_URL=${REDIS_URL:-redis://redis:6379/0}
      - REDIS_PASSWORD=${REDIS_PASSWORD:-}
      - REDIS_DB=${REDIS_DB:-0}
      - DOCKER_SOCKET=${DOCKER_SOCKET:-/var/run/docker.sock}
      - DOCKER_NETWORK=${DOCKER_NETWORK:-nukelab-network}
      - LOG_LEVEL=${LOG_LEVEL:-INFO}
      - LOG_FORMAT=${LOG_FORMAT:-json}
      - DEV_RELOAD=${DEV_RELOAD:-true}
    volumes:
      - ${DOCKER_SOCKET:-/var/run/docker.sock}:/var/run/docker.sock:Z
      - ./backend:/app:Z
    networks:
      - nukelab-network
    depends_on:
      - postgres
      - redis
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.backend.rule=PathPrefix(`/api`)"
      - "traefik.http.services.backend.loadbalancer.server.port=8000"
      - "traefik.http.routers.ws.rule=PathPrefix(`/ws`)"
      - "traefik.http.routers.ws.service=backend"
    restart: unless-stopped

  # Frontend
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: nukelab-frontend
    environment:
      - VITE_API_URL=${VITE_API_URL:-/api}
      - VITE_WS_URL=${VITE_WS_URL:-/ws}
    networks:
      - nukelab-network
    depends_on:
      - backend
    healthcheck:
      test: ["CMD", "wget", "--quiet", "--tries=1", "--spider", "http://localhost:3000/health"]
      interval: 10s
      timeout: 5s
      retries: 3
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.frontend.rule=PathPrefix(`/`)"
      - "traefik.http.services.frontend.loadbalancer.server.port=3000"
      - "traefik.http.routers.frontend.priority=1"
    restart: unless-stopped

  # Celery Worker
  celery-worker:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: nukelab-celery-worker
    command: celery -A app.worker worker --loglevel=info -P threads -c 4
    environment:
      - DATABASE_URL=${DATABASE_URL:-postgresql+asyncpg://nukelab:nukelab123@postgres:5432/nukelab}
      - REDIS_URL=${REDIS_URL:-redis://redis:6379/0}
      - JWT_SECRET=${JWT_SECRET:-dev-jwt-secret}
    volumes:
      - ${DOCKER_SOCKET:-/var/run/docker.sock}:/var/run/docker.sock
      - ./backend:/app:Z
    networks:
      - nukelab-network
    depends_on:
      - redis
      - postgres
    restart: unless-stopped

  # Celery Beat (Scheduler)
  celery-beat:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: nukelab-celery-beat
    command: celery -A app.worker beat --loglevel=info
    environment:
      - DATABASE_URL=${DATABASE_URL:-postgresql+asyncpg://nukelab:nukelab123@postgres:5432/nukelab}
      - REDIS_URL=${REDIS_URL:-redis://redis:6379/0}
    volumes:
      - ./backend:/app:Z
    networks:
      - nukelab-network
    depends_on:
      - redis
      - postgres
    restart: unless-stopped

volumes:
  postgres-data:
    name: nukelab-postgres-data
  letsencrypt:
    name: nukelab-letsencrypt

networks:
  nukelab-network:
    name: nukelab-network
    driver: bridge
