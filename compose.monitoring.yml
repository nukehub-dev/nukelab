# NukeLab monitoring stack — Prometheus + Grafana + infrastructure exporters
# Enable with:
#   ./manage.sh start --overlay compose.monitoring.yml
# Or set PROMETHEUS_ENABLED=true / GRAFANA_ENABLED=true in .env for auto-overlay.
#
# Optional: add Alertmanager with --overlay compose.alertmanager.yml.

services:
  prometheus:
    image: docker.io/prom/prometheus:v3.0.0
    container_name: nukelab-prometheus
    command:
      - --config.file=/etc/prometheus/prometheus.yml
      - --storage.tsdb.path=/prometheus
      - --storage.tsdb.retention.time=${PROMETHEUS_RETENTION_TIME:-15d}
      - --web.console.libraries=/usr/share/prometheus/console_libraries
      - --web.console.templates=/usr/share/prometheus/consoles
      - --web.enable-lifecycle
    volumes:
      - ./monitoring/prometheus/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - ./monitoring/prometheus/rules:/etc/prometheus/rules:ro
      - prometheus-data:/prometheus
    networks:
      - nukelab-network
    ports:
      - "${PROMETHEUS_PORT:-9090}:9090"
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "-q", "--spider", "http://localhost:9090/-/healthy"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 15s

  grafana:
    image: docker.io/grafana/grafana:11.2.0
    container_name: nukelab-grafana
    environment:
      - GF_SECURITY_ADMIN_USER=${GRAFANA_ADMIN_USER:-admin}
      - GF_SECURITY_ADMIN_PASSWORD=${GRAFANA_ADMIN_PASSWORD:-admin}
      - GF_USERS_ALLOW_SIGN_UP=false
      - GF_SERVER_HTTP_PORT=3000
      - GF_PATHS_PROVISIONING=/etc/grafana/provisioning
      - GF_SECURITY_DISABLE_GRAVATAR=true
      - GF_SECURITY_ANGULAR_SUPPORT_ENABLED=false
    volumes:
      - ./monitoring/grafana/provisioning:/etc/grafana/provisioning:ro
      - grafana-data:/var/lib/grafana
    networks:
      - nukelab-network
    ports:
      - "${GRAFANA_PORT:-3001}:3000"
    depends_on:
      - prometheus
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "wget -q --spider http://localhost:3000/api/health || exit 1"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 20s

  postgres-exporter:
    image: quay.io/prometheuscommunity/postgres-exporter:v0.15.0
    container_name: nukelab-postgres-exporter
    environment:
      - DATA_SOURCE_NAME=postgresql://${DATABASE_USER:-nukelab}:${DATABASE_PASSWORD:-nukelab123}@postgres:5432/${DATABASE_NAME:-nukelab}?sslmode=disable
    networks:
      - nukelab-network
    depends_on:
      - postgres
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "-q", "--spider", "http://localhost:9187/"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s

  redis-exporter:
    image: docker.io/oliver006/redis_exporter:v1.55.0
    container_name: nukelab-redis-exporter
    environment:
      - REDIS_ADDR=redis://redis:6379/0
    networks:
      - nukelab-network
    depends_on:
      - redis
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "-q", "--spider", "http://localhost:9121/"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s

  node-exporter:
    image: docker.io/prom/node-exporter:v1.8.2
    container_name: nukelab-node-exporter
    command:
      - --path.rootfs=/host
      - --path.procfs=/host/proc
      - --path.sysfs=/host/sys
      - --collector.filesystem.mount-points-exclude=^/(sys|proc|dev|host|etc)($$|/)
    volumes:
      - /:/host:ro,rslave
    networks:
      - nukelab-network
    pid: host
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "-q", "--spider", "http://localhost:9100/"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s

  celery-exporter:
    image: docker.io/danihodovic/celery-exporter:0.10.14
    container_name: nukelab-celery-exporter
    command:
      - --broker-url=redis://redis:6379/0
    networks:
      - nukelab-network
    depends_on:
      - redis
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "-q", "--spider", "http://localhost:9808/metrics"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 15s

volumes:
  prometheus-data:
    name: nukelab-prometheus-data
  grafana-data:
    name: nukelab-grafana-data
