# NukeLab Prometheus alert rules.
# These are loaded by prometheus.yml via rule_files.

groups:
  - name: nukelab-api
    rules:
      - alert: NukeLabHighErrorRate
        expr: |
          sum(rate(nukelab_http_requests_total{status_code=~"5.."}[5m]))
          /
          sum(rate(nukelab_http_requests_total[5m])) > 0.05
        for: 2m
        labels:
          severity: warning
        annotations:
          summary: "High 5xx error rate on NukeLab API"
          description: "5xx error rate is {{ $value | humanizePercentage }} over the last 5 minutes."

      - alert: NukeLabHighLatency
        expr: |
          histogram_quantile(0.99,
            sum(rate(nukelab_http_request_duration_seconds_bucket[5m])) by (le)
          ) > 1.0
        for: 3m
        labels:
          severity: warning
        annotations:
          summary: "NukeLab API p99 latency is high"
          description: "p99 latency is {{ $value }}s over the last 5 minutes."

      - alert: NukeLabTargetDown
        expr: up{job="nukelab-backend"} == 0
        for: 1m
        labels:
          severity: critical
        annotations:
          summary: "NukeLab backend target is down"
          description: "Prometheus has been unable to scrape the NukeLab backend for more than 1 minute."

      - alert: NukeLabContainerStatusLookupFailures
        expr: |
          sum(rate(nukelab_container_status_lookup_failures_total[5m])) by (reason) > 0
        for: 2m
        labels:
          severity: warning
        annotations:
          summary: "Container runtime status lookups are failing"
          description: "NukeLab cannot reliably query container status (reason={{ $labels.reason }}). This can cause servers to appear stopped while containers are still running."

  - name: nukelab-infrastructure
    rules:
      - alert: NukeLabPostgresConnectionsHigh
        expr: pg_stat_activity_count / pg_settings_max_connections > 0.8
        for: 5m
        labels:
          severity: warning
        annotations:
          summary: "Postgres connection usage is high"
          description: "Postgres is using {{ $value | humanizePercentage }} of max connections."

      - alert: NukeLabRedisMemoryHigh
        expr: |
          (
            redis_memory_max_bytes > 0
            and
            redis_memory_used_bytes / redis_memory_max_bytes > 0.85
          )
        for: 5m
        labels:
          severity: warning
        annotations:
          summary: "Redis memory usage is high"
          description: "Redis is using {{ $value | humanizePercentage }} of max memory."

      - alert: NukeLabRedisMaxMemoryNotSet
        expr: redis_memory_max_bytes == 0
        for: 5m
        labels:
          severity: warning
        annotations:
          summary: "Redis maxmemory is not configured"
          description: "Redis has no maxmemory limit; memory alerts cannot be calculated. Set REDIS_MAXMEMORY in your environment."
