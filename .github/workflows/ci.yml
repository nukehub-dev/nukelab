name: CI/CD

on:
  push:
    branches: [main, develop]
    paths:
      - 'backend/**'
      - 'frontend/**'
      - 'services/auth-sidecar/**'
      - 'compose*.yml'
      - 'scripts/**'
      - 'infrastructure/**'
      - '.github/workflows/ci.yml'
  pull_request:
    branches: [main, develop]
    paths:
      - 'backend/**'
      - 'frontend/**'
      - 'services/auth-sidecar/**'
      - 'compose*.yml'
      - 'scripts/**'
      - 'infrastructure/**'
      - '.github/workflows/ci.yml'
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read
  packages: write
  actions: read

jobs:
  changes:
    name: Detect changed paths
    runs-on: ubuntu-latest
    outputs:
      backend: ${{ steps.filter.outputs.backend }}
      frontend: ${{ steps.filter.outputs.frontend }}
      auth-sidecar: ${{ steps.filter.outputs.auth-sidecar }}
      compose: ${{ steps.filter.outputs.compose }}
      any: ${{ steps.filter.outputs.any }}
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - uses: dorny/paths-filter@v4
        id: filter
        with:
          filters: |
            backend:
              - 'backend/**'
            frontend:
              - 'frontend/**'
            auth-sidecar:
              - 'services/auth-sidecar/**'
            compose:
              - 'compose*.yml'
              - 'scripts/**'
              - 'infrastructure/**'
            any:
              - 'backend/**'
              - 'frontend/**'
              - 'services/auth-sidecar/**'
              - 'compose*.yml'
              - 'scripts/**'
              - 'infrastructure/**'

  lint-backend:
    name: Lint Backend
    runs-on: ubuntu-latest
    needs: changes
    if: needs.changes.outputs.backend == 'true' || needs.changes.outputs.compose == 'true' || github.event_name == 'workflow_dispatch'
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v7
        with:
          python-version: "3.13"

      - name: Lint backend
        run: |
          chmod +x ./nukelabctl
          ./nukelabctl lint backend

  lint-frontend:
    name: Lint Frontend
    runs-on: ubuntu-latest
    needs: changes
    if: needs.changes.outputs.frontend == 'true' || needs.changes.outputs.compose == 'true' || github.event_name == 'workflow_dispatch'
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Set up Node.js
        uses: actions/setup-node@v6
        with:
          node-version: "24"
          cache: npm
          cache-dependency-path: ./frontend/package-lock.json

      - name: Install dependencies
        working-directory: ./frontend
        run: npm ci

      - name: Lint
        working-directory: ./frontend
        run: npm run lint

      - name: Format check
        working-directory: ./frontend
        run: npm run format:check

      - name: Build
        working-directory: ./frontend
        run: npm run build

  test-backend:
    name: Test Backend
    runs-on: ubuntu-latest
    needs: changes
    if: needs.changes.outputs.backend == 'true' || needs.changes.outputs.compose == 'true' || github.event_name == 'workflow_dispatch'
    env:
      CONTAINER_ENGINE: docker
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Set up environment
        run: |
          cp .env.example .env.development
          mkdir -p /tmp/nukelab-volumes
          echo "VOLUME_STORAGE_PATH=/tmp/nukelab-volumes" >> .env.development
          chmod +x ./nukelabctl

      - name: Run backend tests
        run: ./nukelabctl test backend --coverage --cov-report=xml

      - name: Coverage summary
        uses: irongut/CodeCoverageSummary@v1.3.0
        with:
          filename: backend/coverage.xml
          badge: true
          fail_below_min: false
          format: markdown
          hide_branch_rate: false
          hide_complexity: true
          indicators: true
          output: both
          thresholds: '60 80'

      - name: Stop backing services
        if: always()
        run: |
          chmod +x ./nukelabctl
          ./nukelabctl stop dev || true

  build-images:
    name: Build & push images
    runs-on: ubuntu-latest
    needs: [changes, lint-backend, lint-frontend, test-backend]
    if: |
      (success() || failure()) &&
      !contains(needs.*.result, 'cancelled') &&
      (needs.changes.outputs.any == 'true' || github.event_name == 'workflow_dispatch') &&
      needs.lint-backend.result != 'failure' &&
      needs.lint-frontend.result != 'failure' &&
      needs.test-backend.result != 'failure'
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: backend
            context: ./backend
            dockerfile: ./backend/Dockerfile
            target: runtime
            image: ghcr.io/${{ github.repository_owner }}/nukelab-backend
          - name: frontend
            context: ./frontend
            dockerfile: ./frontend/Dockerfile
            image: ghcr.io/${{ github.repository_owner }}/nukelab-frontend
          - name: auth-sidecar
            context: ./services/auth-sidecar
            dockerfile: ./services/auth-sidecar/Dockerfile
            image: ghcr.io/${{ github.repository_owner }}/nukelab-auth-sidecar
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Log in to GitHub Container Registry
        if: github.event_name == 'push'
        uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Generate image tags
        id: meta
        run: |
          chmod +x ./scripts/ci-version.sh
          ./scripts/ci-version.sh
        env:
          GITHUB_REF: ${{ github.ref }}
          GITHUB_SHA: ${{ github.sha }}

      - name: Build and push
        if: |
          (matrix.name == 'backend' && needs.changes.outputs.backend == 'true') ||
          (matrix.name == 'frontend' && needs.changes.outputs.frontend == 'true') ||
          (matrix.name == 'auth-sidecar' && needs.changes.outputs.auth-sidecar == 'true') ||
          needs.changes.outputs.compose == 'true' ||
          github.event_name == 'workflow_dispatch'
        uses: docker/build-push-action@v7
        with:
          context: ${{ matrix.context }}
          file: ${{ matrix.dockerfile }}
          target: ${{ matrix.target }}
          push: ${{ github.event_name == 'push' }}
          tags: ${{ steps.meta.outputs.tags }}
          labels: |
            org.opencontainers.image.source=${{ github.server_url }}/${{ github.repository }}
            org.opencontainers.image.revision=${{ github.sha }}
          cache-from: type=gha,scope=${{ matrix.name }}
          cache-to: type=gha,mode=max,scope=${{ matrix.name }}
