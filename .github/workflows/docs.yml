name: Docs

on:
  push:
    branches: [main, develop]
    paths:
      - 'docs/**'
      - 'README.md'
      - 'AGENTS.md'
      - '.github/workflows/docs.yml'
  pull_request:
    branches: [main, develop]
    paths:
      - 'docs/**'
      - 'README.md'
      - 'AGENTS.md'
      - '.github/workflows/docs.yml'
  workflow_dispatch:

permissions:
  contents: read

jobs:
  lint:
    name: Markdown Lint
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Run markdownlint
        uses: DavidAnson/markdownlint-cli2-action@v23
        with:
          globs: '**/*.md'
          config: '.markdownlint-cli2.jsonc'

  links:
    name: Link Check
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Check links
        uses: lycheeverse/lychee-action@v2
        with:
          args: --no-progress --exclude-loopback --exclude-path 'node_modules' --exclude-path 'backend/.venv-dev' --exclude-path 'backend/.venv' --exclude-path 'frontend/node_modules' --exclude-path 'frontend/test-results' --exclude-path 'frontend/dist' -- '*.md' 'docs/**/*.md'
          fail: true
