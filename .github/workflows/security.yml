name: Security

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]
  schedule:
    # Run weekly on Sundays at 06:00 UTC.
    - cron: '0 6 * * 0'
  workflow_dispatch:

permissions:
  contents: read

env:
  CONTAINER_ENGINE: docker

jobs:
  dependency-and-sast-scans:
    name: Dependency / SAST / SBOM
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: '3.13'

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '24'

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y shellcheck shfmt

      - name: Run NukeLab security scans
        run: |
          ./nukelabctl security --check-base-images --sbom --with-dev

      - name: Upload security reports
        uses: actions/upload-artifact@v7
        if: always()
        with:
          name: security-reports
          path: backend/reports/security/
          retention-days: 30

  container-image-scan:
    name: Container Image Scan
    runs-on: ubuntu-latest
    needs: dependency-and-sast-scans
    env:
      CONTAINER_ENGINE: docker
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: '3.13'

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '24'

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Build core images
        run: |
          ./nukelabctl build all

      - name: Run Trivy image scans
        uses: aquasecurity/trivy-action@v0.36.0
        with:
          image-ref: 'nukelab-backend:latest'
          format: 'sarif'
          output: 'trivy-backend.sarif'
          severity: 'HIGH,CRITICAL'
          exit-code: '1'

      - name: Run Trivy image scan (frontend)
        uses: aquasecurity/trivy-action@v0.36.0
        with:
          image-ref: 'nukelab-frontend:latest'
          format: 'sarif'
          output: 'trivy-frontend.sarif'
          severity: 'HIGH,CRITICAL'
          exit-code: '1'

      - name: Upload Trivy SARIF
        uses: github/codeql-action/upload-sarif@v3
        if: always()
        with:
          sarif_file: .

  secret-scan:
    name: Secret Scan
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Run Gitleaks
        uses: gitleaks/gitleaks-action@v3
        env:
          GITLEAKS_LICENSE: ${{ secrets.GITLEAKS_LICENSE }}

      - name: Run TruffleHog
        uses: trufflesecurity/trufflehog@main
        with:
          path: ./
          base: main
          head: HEAD
          extra_args: --debug --only-verified

  signed-commits-check:
    name: Signed Commits Check
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Check for unsigned commits
        run: |
          ./nukelabctl security --signed-commits --no-bandit --no-pip-audit --no-npm-audit --no-trivy
        continue-on-error: true

      - name: Remediation notice
        if: failure()
        run: |
          echo "::warning::Branch contains unsigned commits. Enable branch protection"
          echo "::warning::requiring signed commits and configure team GPG/SSH signing."
