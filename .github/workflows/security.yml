name: Security

on:
  push:
    branches: [main, master]
    paths:
      - 'backend/**'
      - 'frontend/**'
      - 'services/**'
      - 'environments/**'
      - 'compose*.yml'
      - 'scripts/**'
      - 'infrastructure/**'
      - '.github/workflows/security.yml'
  pull_request:
    branches: [main, master]
    paths:
      - 'backend/**'
      - 'frontend/**'
      - 'services/**'
      - 'environments/**'
      - 'compose*.yml'
      - 'scripts/**'
      - 'infrastructure/**'
      - '.github/workflows/security.yml'
  schedule:
    # Run weekly on Sundays at 06:00 UTC.
    - cron: '0 6 * * 0'
  workflow_dispatch:

permissions:
  contents: read

env:
  CONTAINER_ENGINE: docker

jobs:
  dependency-and-sast-scans:
    name: Dependency / SAST / SBOM
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: '3.13'

      - name: Set up Node.js
        uses: actions/setup-node@v6
        with:
          node-version: '24'

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y shellcheck shfmt

      - name: Run NukeLab security scans
        run: |
          cp .env.example .env.development
          chmod +x ./nukelabctl
          chmod +x ./scripts/security/*.sh
          ./nukelabctl security --with-dev
        continue-on-error: true

      - name: Upload security reports
        uses: actions/upload-artifact@v7
        if: always()
        with:
          name: security-reports
          path: backend/reports/security/
          retention-days: 30

  container-image-scan:
    name: Container Image Scan
    runs-on: ubuntu-latest
    needs: dependency-and-sast-scans
    permissions:
      contents: read
      security-events: write
    env:
      CONTAINER_ENGINE: docker
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: '3.13'

      - name: Set up Node.js
        uses: actions/setup-node@v6
        with:
          node-version: '24'

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Set up environment
        run: |
          cp .env.example .env.development
          chmod +x ./nukelabctl

      - name: Build core images
        run: ./nukelabctl build all

      - name: Run Trivy image scans
        uses: aquasecurity/trivy-action@v0.36.0
        continue-on-error: true
        with:
          image-ref: 'nukelab-backend:latest'
          format: 'sarif'
          output: 'trivy-backend.sarif'
          severity: 'HIGH,CRITICAL'

      - name: Run Trivy image scan (frontend)
        uses: aquasecurity/trivy-action@v0.36.0
        continue-on-error: true
        with:
          image-ref: 'nukelab-frontend:latest'
          format: 'sarif'
          output: 'trivy-frontend.sarif'
          severity: 'HIGH,CRITICAL'

      - name: Merge SARIF files
        run: |
          python3 -c "
          import json, glob
          runs = []
          for f in glob.glob('trivy-*.sarif'):
              runs.extend(json.load(open(f)).get('runs', []))
          if not runs:
              merged = {'\$schema': 'https://json.schemastore.org/sarif-2.1.0.json', 'version': '2.1.0', 'runs': []}
          else:
              merged = {'\$schema': 'https://json.schemastore.org/sarif-2.1.0.json', 'version': '2.1.0', 'runs': [{
                  'tool': runs[0]['tool'],
                  'results': [],
              }]}
              for run in runs:
                  merged['runs'][0]['results'].extend(run.get('results', []))
          json.dump(merged, open('trivy-merged.sarif', 'w'), indent=2)
          "

      - name: Upload Trivy SARIF
        uses: github/codeql-action/upload-sarif@v4
        if: always()
        with:
          sarif_file: trivy-merged.sarif

  secret-scan:
    name: Secret Scan
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Run Gitleaks
        uses: gitleaks/gitleaks-action@v3
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GITLEAKS_LICENSE: ${{ secrets.GITLEAKS_LICENSE }}

      - name: Run TruffleHog
        uses: trufflesecurity/trufflehog@main
        with:
          path: ./
          # PR: scan from the PR base commit to the PR head commit.
          # Push: scan the just-pushed range (before..after).
          # Schedule / manual dispatch: scan the full history (empty base).
          base: ${{ github.event.pull_request.base.sha || github.event.before || '' }}
          head: ${{ github.event.pull_request.head.sha || github.event.after || 'HEAD' }}
          extra_args: --debug --only-verified

  signed-commits-check:
    name: Signed Commits Check
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Check for unsigned commits
        run: |
          cp .env.example .env.development
          chmod +x ./nukelabctl
          ./nukelabctl security --signed-commits --no-bandit --no-pip-audit --no-npm-audit --no-trivy
        continue-on-error: true

      - name: Remediation notice
        if: failure()
        run: |
          echo "::warning::Branch contains unsigned commits. Enable branch protection"
          echo "::warning::requiring signed commits and configure team GPG/SSH signing."
