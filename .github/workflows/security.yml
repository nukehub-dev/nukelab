name: Security Scans

on:
  push:
    branches: [main, master, develop]
  pull_request:
    branches: [main, master, develop]

permissions:
  contents: read
  actions: write

jobs:
  security:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Install frontend dependencies
        run: |
          cd frontend
          npm ci

      - name: Run dependency and static security scans
        run: ./nukelabctl security --no-trivy

      - name: Generate SBOM artifacts
        run: ./nukelabctl security --sbom --no-bandit --no-pip-audit --no-npm-audit --no-trivy

      - name: Upload SBOM artifacts
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: sbom
          path: backend/reports/security/sbom/*.json
          if-no-files-found: ignore
