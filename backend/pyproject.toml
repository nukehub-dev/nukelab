[tool.ruff]
target-version = "py312"
line-length = 100

[tool.ruff.lint]
select = ["E", "F", "I", "W", "UP", "B", "C4", "SIM"]
ignore = ["E501", "B008", "E402", "B904", "SIM", "E711", "E712"]

[tool.ruff.lint.per-file-ignores]
"tests/**" = ["B017"]
"tests/conftest.py" = ["B017", "F403"]

[tool.ruff.format]
quote-style = "double"
indent-style = "space"
skip-magic-trailing-comma = false
line-ending = "auto"
