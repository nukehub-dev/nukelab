[tool.ruff]
target-version = "py312"
line-length = 100

[tool.ruff.lint]
select = ["E", "F", "I", "W", "UP", "B", "C4", "SIM"]
ignore = ["E501", "B008", "E402", "B904", "SIM"]

[tool.ruff.lint.per-file-ignores]
"tests/**" = ["B017"]
"tests/conftest.py" = ["B017", "F403"]

[tool.ruff.format]
quote-style = "double"
indent-style = "space"
skip-magic-trailing-comma = false
line-ending = "auto"

[tool.bandit]
exclude_dirs = ["tests", "htmlcov", ".pytest_cache", ".ruff_cache", "alembic/versions"]
skips = ["B101"]  # assert_used is acceptable in our codebase

