name: nukelab-backend
channels:
  - conda-forge
  - defaults
dependencies:
  - python=3.12
  - pip
  # Database
  - asyncpg
  - psycopg2-binary
  # Web framework
  - fastapi
  - uvicorn
  # Data validation
  - pydantic>=2.0
  - pydantic-settings
  # Security
  - python-jose
  - cryptography
  - bcrypt
  - passlib
  # Async
  - aiohttp
  - aiodocker
  # Task queue
  - celery
  - redis-py
  # Utilities
  - python-dotenv
  - python-multipart
  # Development
  - pytest
  - pytest-asyncio
  - black
  - isort
  - mypy
  - pip:
    # Packages not available in conda
    - alembic
