events {
    worker_connections 1024;
}

# PID file must live on a writable tmpfs path when the root filesystem is
# mounted read-only.
pid /var/run/nginx.pid;

http {
    include /etc/nginx/mime.types;
    default_type application/octet-stream;

    # Run on an unprivileged port with writable tmpfs-backed directories so the
    # container can start with ReadonlyRootfs.
    client_body_temp_path /tmp/nginx_client_body;
    proxy_temp_path /tmp/nginx_proxy;
    fastcgi_temp_path /tmp/nginx_fastcgi;
    uwsgi_temp_path /tmp/nginx_uwsgi;
    scgi_temp_path /tmp/nginx_scgi;

    map $http_upgrade $connection_upgrade {
        default upgrade;
        ''      close;
    }

    # Logging to stdout/stderr avoids writing to the read-only root filesystem.
    access_log off;
    error_log stderr;

    # Upstream for auth sidecar (unprivileged port; nginx listens on 8080)
    upstream auth_sidecar {
        server 127.0.0.1:8081;
        keepalive 32;
    }

    # Main server
    server {
        listen 8080;
        server_name localhost;

        # Custom error pages
        error_page 401 /401.html;
        error_page 403 /403.html;

        location = /401.html {
            internal;
            return 401 "<h1>401 Unauthorized</h1><p>Please log in to access this server.</p>\n";
            add_header Content-Type text/html;
        }

        location = /403.html {
            internal;
            return 403 "<h1>403 Forbidden</h1><p>You do not have permission to access this server.</p>\n";
            add_header Content-Type text/html;
        }

        # Auth validation via sidecar (internal only)
        location = /auth {
            internal;
            proxy_pass http://auth_sidecar/auth;
            proxy_pass_request_body off;
            proxy_set_header Content-Length "";
            proxy_set_header X-Original-Uri $request_uri;
            proxy_set_header X-Original-Method $request_method;
            # Forward auth headers from original request
            proxy_set_header Authorization $http_authorization;
            proxy_set_header Cookie $http_cookie;
            proxy_connect_timeout 2s;
            proxy_read_timeout 2s;
        }

        # Protected content - proxy to terminal by default
        location / {
            auth_request /auth;
            auth_request_set $auth_user $upstream_http_x_user_id;
            auth_request_set $auth_server $upstream_http_x_server_id;

            proxy_pass http://127.0.0.1:7681;
            proxy_set_header Host $http_host;
            
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection $connection_upgrade;
            
            proxy_set_header Accept-Encoding "";
            proxy_http_version 1.1;
            proxy_buffering off;
            proxy_read_timeout 86400;
            proxy_send_timeout 86400;
            
            # Pass auth info to backend
            proxy_set_header X-User-Id $auth_user;
            proxy_set_header X-Server-Id $auth_server;
            proxy_set_header X-Auth-Source "sidecar";
        }

        # Health check (no auth required)
        location /health {
            access_log off;
            return 200 "healthy\n";
            add_header Content-Type text/plain;
        }

        # Auth sidecar health check (no auth required)
        location /auth/health {
            proxy_pass http://auth_sidecar/health;
            access_log off;
        }
    }
}
