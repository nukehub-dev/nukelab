events {
    worker_connections 1024;
}

http {
    include /etc/nginx/mime.types;
    default_type application/octet-stream;

    # Logging
    access_log /var/log/nginx/access.log;
    error_log /var/log/nginx/error.log;

    # Resolver for dynamic DNS (don't cache IPs)
    resolver 10.89.1.1 valid=5s;

    # Main server
    server {
        listen 80;
        server_name localhost;

        # Custom error pages
        error_page 401 /401.html;
        error_page 403 /403.html;

        location = /401.html {
            internal;
            return 401 "\u003ch1\u003e401 Unauthorized\u003c/h1\u003e\u003cp\u003ePlease log in to access this server.\u003c/p\u003e\n";
            add_header Content-Type text/html;
        }

        location = /403.html {
            internal;
            return 403 "\u003ch1\u003e403 Forbidden\u003c/h1\u003e\u003cp\u003eYou do not have permission to access this server.\u003c/p\u003e\n";
            add_header Content-Type text/html;
        }

        # Auth verification endpoint (internal only)
        location = /auth {
            internal;
            proxy_pass http://nukelab-backend:8000/api/auth/verify;
            proxy_pass_request_body off;
            proxy_set_header Content-Length "";
            proxy_set_header X-Original-Uri $request_uri;
            # Forward auth headers from original request
            proxy_set_header Authorization $http_authorization;
            proxy_set_header Cookie $http_cookie;
        }

        # Protected content
        location / {
            auth_request /auth;
            auth_request_set $auth_user $upstream_http_x_user_id;

            root /var/www/html;
            index index.html;

            # Pass user info to downstream if needed
            add_header X-User-Id $auth_user always;
        }

        # Health check (no auth required)
        location /health {
            access_log off;
            return 200 "healthy\n";
            add_header Content-Type text/plain;
        }
    }
}
