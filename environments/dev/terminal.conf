# Protected content - proxy to the ttyd terminal by default.
location / {
    auth_request /auth;
    auth_request_set $auth_user $upstream_http_x_user_id;
    auth_request_set $auth_server $upstream_http_x_server_id;

    proxy_pass http://127.0.0.1:7681;
    proxy_set_header Host $http_host;

    proxy_set_header Upgrade $http_upgrade;
    proxy_set_header Connection $connection_upgrade;

    proxy_set_header Accept-Encoding "";
    proxy_http_version 1.1;
    proxy_buffering off;
    proxy_read_timeout 86400;
    proxy_send_timeout 86400;

    # Pass auth info to backend
    proxy_set_header X-User-Id $auth_user;
    proxy_set_header X-Server-Id $auth_server;
    proxy_set_header X-Auth-Source "sidecar";
}
