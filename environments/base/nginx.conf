events {
    worker_connections 1024;
}

# PID file must live on a writable tmpfs path when the root filesystem is
# mounted read-only.
pid /var/run/nginx.pid;

http {
    include /etc/nginx/mime.types;
    default_type application/octet-stream;

    # Run on an unprivileged port with writable tmpfs-backed directories so the
    # container can start with ReadonlyRootfs.
    client_body_temp_path /tmp/nginx_client_body;
    proxy_temp_path /tmp/nginx_proxy;
    fastcgi_temp_path /tmp/nginx_fastcgi;
    uwsgi_temp_path /tmp/nginx_uwsgi;
    scgi_temp_path /tmp/nginx_scgi;

    map $http_upgrade $connection_upgrade {
        default upgrade;
        ''      close;
    }

    # Determine the public server path for unauthorized redirects.
    # Traefik's StripPrefix middleware stores the stripped prefix in
    # X-Forwarded-Prefix; fall back to the request URI for direct access.
    map $http_x_forwarded_prefix $server_public_path {
        default $http_x_forwarded_prefix;
        ""      $request_uri;
    }

    # Logging to stdout/stderr avoids writing to the read-only root filesystem.
    access_log off;
    error_log stderr;

    # Upstream for auth sidecar (unprivileged port; nginx listens on 8080)
    upstream auth_sidecar {
        server 127.0.0.1:8081;
        keepalive 32;
    }

    # Main server
    server {
        listen 8080;
        server_name localhost;

        # Custom error pages
        error_page 401 = @handle_unauthorized;
        error_page 403 /403.html;

        # Browser page loads that lack a server access token are redirected back
        # to the SPA. The SPA reads the ?next= parameter, runs the gateway flow,
        # acquires a token, and then redirects to the original server URL.
        # API/WebSocket requests still receive a plain 401.
        location @handle_unauthorized {
            internal;
            if ($http_accept ~* "text/html") {
                return 302 /?next=$server_public_path;
            }
            return 401 "<h1>401 Unauthorized</h1><p>Please log in to access this server.</p>\n";
        }

        location = /403.html {
            internal;
            return 403 "<h1>403 Forbidden</h1><p>You do not have permission to access this server.</p>\n";
            add_header Content-Type text/html;
        }

        # Auth validation via sidecar (internal only)
        location = /auth {
            internal;
            proxy_pass http://auth_sidecar/auth;
            proxy_pass_request_body off;
            proxy_set_header Content-Length "";
            proxy_set_header X-Original-Uri $request_uri;
            proxy_set_header X-Original-Method $request_method;
            # Forward auth headers from original request
            proxy_set_header Authorization $http_authorization;
            proxy_set_header Cookie $http_cookie;
            proxy_connect_timeout 2s;
            proxy_read_timeout 2s;
        }

        # Child environments drop their protected application locations into
        # /etc/nginx/conf.d/*.conf (included here so they share auth/sidecar).
        include /etc/nginx/conf.d/*.conf;

        # Health check (no auth required)
        location /health {
            access_log off;
            return 200 "healthy\n";
            add_header Content-Type text/plain;
        }

        # Auth sidecar health check (no auth required)
        location /auth/health {
            proxy_pass http://auth_sidecar/health;
            access_log off;
        }
    }
}
